<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nearby Distribution Centers</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <style>
        #map {
            height: 100vh;
            width: 100%;
        }
    </style>
</head>
<body>
    <h1>Nearby Distribution Centers</h1>
    <p>Find the nearest distribution center to your current location.</p>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script>
        function initMap() {
            // Get user's location
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    const userLocation = {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude,
                    };

                    // Initialize the map with OpenStreetMap tiles
                    const map = L.map('map').setView([userLocation.lat, userLocation.lng], 14);

                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
                    }).addTo(map);

                    // Add a marker for user's location
                    L.marker([userLocation.lat, userLocation.lng])
                        .addTo(map)
                        .bindPopup('You are here')
                        .openPopup();

                    // Example distribution centers (replace with real data)
                    const centers = [
                        { lat: userLocation.lat + 0.01, lng: userLocation.lng + 0.01, name: "Center 1" },
                        { lat: userLocation.lat - 0.01, lng: userLocation.lng - 0.01, name: "Center 2" },
                    ];

                    // Add markers for distribution centers
                    centers.forEach((center) => {
                        L.marker([center.lat, center.lng])
                            .addTo(map)
                            .bindPopup(center.name);
                    });
                });
            } else {
                alert("Geolocation is not supported by this browser.");
            }
        }

        // Initialize the map when the page is loaded
        window.onload = initMap;
    </script>
</body>
</html>
